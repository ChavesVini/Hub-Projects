name: "Sync Hub"

on:
  schedule:
    - cron: '40 13 * * *'
  # repository_dispatch:
  #   types: [repo_created]
  # workflow_dispatch:
  #   inputs:
  #     repo_name:
  #       description: 'Target repository name'
  #       required: false
  #       default: ''

permissions:
  contents: write
  pull-requests: write

jobs:
  update-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Hub Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          submodules: 'false'
          fetch-depth: 0

      - name: Set up Python Environment
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install Python Dependencies
        run: pip install requests

      - name: Execute Sync Logic
        env:
          REPO_NAME: ${{ github.event.client_payload.repo_name || github.event.inputs.repo_name }}
          USER_NAME: ${{ github.repository_owner }}
          API_TOKEN: ${{ secrets.API_TRIGGER_TOKEN }}
        run: |
          chmod +x update_hub.sh
          
          if [ -n "$REPO_NAME" ]; then
            echo "Processing specific repository: $REPO_NAME"
            ./update_hub.sh
          else
            echo "Initiating full scan of all repositories..."
            python scanner_all_repositories.py
          fi

      - name: Finalize and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --quiet && git diff --staged --quiet || (git commit -m ":sparkles: update project hub" && git push)
