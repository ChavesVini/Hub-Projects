name: Sync Hub
on:
  repository_dispatch:
    types: [repo_created]

jobs:
  update-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.api_trigger_token }}
          submodules: true

      - name: Run Update Script
        env:
          REPO_NAME: ${{ github.event.client_payload.repo_name }}
          USER_NAME: ${{ github.repository_owner }}
        run: chmod +x update_hub.sh && ./update_hub.sh